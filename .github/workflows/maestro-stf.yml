name: Maestro Tests on Real Device

on:
  workflow_dispatch:
    inputs:
      device_address:
        description: 'ADB адрес устройства'
        required: false
        default: '80.82.40.133:5555'
        type: string
      test_path:
        description: 'Путь к тесту'
        required: false
        default: '.maestro/'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      
      - name: Install ADB
        run: sudo apt-get install -y android-tools-adb
      
      - name: Connect to real device
        run: |
          DEVICE="${{ inputs.device_address }}"
          echo "🔌 Connecting to $DEVICE"
          adb connect "$DEVICE"
          
          for i in {1..10}; do
            sleep 2
            if adb devices | grep -q "$DEVICE.*device"; then
              echo "✅ Device connected"
              break
            fi
          done
          
          adb devices
          echo "📱 Device model:"
          adb shell getprop ro.product.model
          echo "Android version:"
          adb shell getprop ro.build.version.release
      
      - name: Check if app is installed
        run: |
          APP_ID="com.example.myapp"
          if adb shell pm list packages | grep -q "$APP_ID"; then
            echo "✅ App is installed"
          else
            echo "⚠️ App not found. Installing..."
            # adb install app.apk
          fi
      
      - name: Run Maestro tests
        id: maestro_tests
        continue-on-error: true
        run: |
          maestro test "${{ inputs.test_path }}" --format junit --output maestro-report.xml
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
      
      - name: Final status
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi