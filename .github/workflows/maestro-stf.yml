name: Maestro Тесты на STF ферме

on:
  workflow_dispatch:
    inputs:
      device_address:
        description: 'ADB адрес устройства'
        required: false
        default: '80.82.40.133:7401'
        type: string
      test_path:
        description: 'Путь к тесту или папке'
        required: false
        default: '.maestro/'
        type: string

jobs:
  maestro-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Maestro
        run: |
          echo "📦 Устанавливаем Maestro..."
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          echo "✅ Maestro установлен: $(maestro --version 2>&1 | head -1)"

      - name: Установить ADB
        run: |
          echo "📦 Устанавливаем ADB..."
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          echo "✅ ADB установлен: $(adb --version | head -1)"

      - name: Подключиться к устройству
        run: |
          DEVICE_ADDR="${{ inputs.device_address }}"
          echo "🔌 Подключаемся к устройству: $DEVICE_ADDR"
          
          # Подключаемся через ADB
          adb connect "$DEVICE_ADDR"
          
          # Ждем подключения
          for i in {1..10}; do
            sleep 2
            if adb devices | grep -q "$DEVICE_ADDR.*device"; then
              echo "✅ Устройство подключено"
              break
            fi
            echo "⏳ Ожидание подключения... ($i/10)"
          done
          
          # Проверяем подключение
          echo "🔍 Проверка ADB:"
          adb devices
          
          # Сохраняем адрес устройства
          echo "DEVICE_ADDR=$DEVICE_ADDR" >> $GITHUB_ENV
          
          # Информация об устройстве
          echo "📊 Информация об устройстве:"
          MODEL=$(adb shell getprop ro.product.model 2>/dev/null || echo "неизвестно")
          ANDROID_VERSION=$(adb shell getprop ro.build.version.release 2>/dev/null || echo "неизвестно")
          echo "  Модель: $MODEL"
          echo "  Android: $ANDROID_VERSION"

      - name: Запустить Maestro тесты
        id: maestro_tests
        continue-on-error: true
        run: |
          TEST_PATH="${{ inputs.test_path || '.maestro/' }}"
          
          if [ ! -d ".maestro" ] && [ ! -f "$TEST_PATH" ]; then
            echo "❌ Ошибка: Папка .maestro или файл $TEST_PATH не найдены"
            echo "📁 Содержимое репозитория:"
            ls -la
            exit 1
          fi
          
          echo "🚀 Запускаем тесты из: $TEST_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          
          # Запускаем тесты
          maestro test "$TEST_PATH" \
            --format junit \
            --output maestro-report.xml
          
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Тесты прошли успешно"
          else
            echo "⚠️ Тесты завершились с ошибкой (код: $EXIT_CODE)"
          fi

      - name: Сохранить результаты тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
          if-no-files-found: warn

      - name: Отключиться от устройства
        if: always()
        continue-on-error: true
        run: |
          adb disconnect
          echo "✅ Устройство отключено"

      - name: Итоговый статус
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            echo "❌ Тесты завершились с ошибкой"
            exit 1
          else
            echo "✅ Все тесты прошли успешно"
          fi