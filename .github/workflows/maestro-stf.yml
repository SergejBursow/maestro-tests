name: Maestro Tests on Real Device

on:
  workflow_dispatch:
    inputs:
      device_address:
        description: 'ADB адрес устройства в формате host:port'
        required: false
        default: '80.82.40.133:7401'
        type: string
      app_id:
        description: 'Android applicationId для Maestro'
        required: false
        default: 'ru.neopharm.stolichki'
        type: string
      test_path:
        description: 'Путь к тесту'
        required: false
        default: '.maestro/'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      
      - name: Install ADB
        run: sudo apt-get install -y android-tools-adb
      
      - name: Check ADB endpoint reachability
        run: |
          DEVICE="${{ inputs.device_address }}"
          HOST="${DEVICE%:*}"
          PORT="${DEVICE##*:}"

          echo "🌐 Checking TCP connectivity to $HOST:$PORT"
          if ! timeout 10 bash -lc "cat < /dev/null > /dev/tcp/$HOST/$PORT"; then
            echo "::error::GitHub runner cannot reach $HOST:$PORT."
            echo "::error::If STF is running on another laptop in a private network, use a self-hosted runner on that laptop or expose a public/tunneled ADB endpoint."
            exit 1
          fi

      - name: Connect to real device
        run: |
          DEVICE="${{ inputs.device_address }}"
          echo "🔌 Connecting to $DEVICE"
          adb connect "$DEVICE"
          
          for i in {1..10}; do
            sleep 2
            if adb devices | grep -q "$DEVICE.*device"; then
              echo "✅ Device connected"
              break
            fi
          done
          
          adb devices
          echo "📱 Device model:"
          adb -s "$DEVICE" shell getprop ro.product.model
          echo "Android version:"
          adb -s "$DEVICE" shell getprop ro.build.version.release
          echo "ANDROID_SERIAL=$DEVICE" >> "$GITHUB_ENV"
          echo "APP_ID=${{ inputs.app_id }}" >> "$GITHUB_ENV"
      
      - name: Check if app is installed
        run: |
          APP_ID="${{ inputs.app_id }}"
          if adb -s "$ANDROID_SERIAL" shell pm list packages | grep -q "$APP_ID"; then
            echo "✅ App is installed"
          else
            echo "::warning::App $APP_ID not found on device."
            echo "⚠️ Add an APK install step or preinstall the app in STF before running Maestro."
            # adb install app.apk
          fi
      
      - name: Run Maestro tests
        id: maestro_tests
        continue-on-error: true
        run: |
          echo "▶️ Running Maestro on $ANDROID_SERIAL for $APP_ID"
          maestro test "${{ inputs.test_path }}" --format junit --output maestro-report.xml
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
      
      - name: Final status
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi
