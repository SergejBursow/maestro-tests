name: Maestro Tests on Real Device

on:
  workflow_dispatch:
    inputs:
      device_address:
        description: 'ADB адрес устройства в формате host:port'
        required: true
        type: string
      app_id:
        description: 'Android applicationId для Maestro'
        required: false
        default: 'com.example.testmaestro'
        type: string
      test_path:
        description: 'Путь к тесту'
        required: false
        default: '.maestro/flows'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ADB_PRIVATE_KEY: ${{ secrets.ADB_PRIVATE_KEY }}
      ADB_PUBLIC_KEY: ${{ secrets.ADB_PUBLIC_KEY }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      
      - name: Install ADB
        run: sudo apt-get install -y android-tools-adb

      - name: Configure ADB keys
        if: env.ADB_PRIVATE_KEY != ''
        run: |
          mkdir -p "$HOME/.android"
          printf '%s\n' "$ADB_PRIVATE_KEY" > "$HOME/.android/adbkey"
          chmod 600 "$HOME/.android/adbkey"

          if [ -n "$ADB_PUBLIC_KEY" ]; then
            printf '%s\n' "$ADB_PUBLIC_KEY" > "$HOME/.android/adbkey.pub"
            chmod 644 "$HOME/.android/adbkey.pub"
          fi

          echo "ADB_VENDOR_KEYS=$HOME/.android" >> "$GITHUB_ENV"
          echo "✅ ADB ключ загружен из GitHub Secrets"
      
      - name: Check ADB endpoint reachability
        run: |
          DEVICE="${{ inputs.device_address }}"
          HOST="${DEVICE%:*}"
          PORT="${DEVICE##*:}"

          echo "🌐 Checking TCP connectivity to $HOST:$PORT"
          if ! timeout 10 bash -lc "cat < /dev/null > /dev/tcp/$HOST/$PORT"; then
            echo "::error::GitHub runner не может подключиться к $HOST:$PORT."
            echo "::error::Проверь, что устройство открыто в STF и ADB endpoint сейчас активен."
            exit 1
          fi

      - name: Connect to real device
        run: |
          DEVICE="${{ inputs.device_address }}"
          echo "🔌 Connecting to $DEVICE"
          CONNECT_OUTPUT="$(adb connect "$DEVICE" 2>&1 || true)"
          printf '%s\n' "$CONNECT_OUTPUT"
          
          for i in {1..10}; do
            sleep 2
            if adb devices | grep -q "$DEVICE.*device"; then
              echo "✅ Device connected"
              break
            fi
          done
          
          adb devices

          if adb devices | grep -q "$DEVICE.*unauthorized"; then
            echo "::error::ADB подключился к $DEVICE, но устройство не приняло ключ."
            echo "::error::Проверь, что в GitHub Secrets лежат правильные ADB ключи из ~/.android/adbkey и ~/.android/adbkey.pub."
            echo "::error::Проверь, что именно этот публичный ключ добавлен в STF в разделе Ключи."
            exit 1
          fi

          if ! adb devices | grep -q "$DEVICE.*device"; then
            echo "::error::ADB не смог полностью подключиться к $DEVICE."
            exit 1
          fi

          echo "📱 Device model:"
          adb -s "$DEVICE" shell getprop ro.product.model
          echo "Android version:"
          adb -s "$DEVICE" shell getprop ro.build.version.release
          echo "ANDROID_SERIAL=$DEVICE" >> "$GITHUB_ENV"
          echo "APP_ID=${{ inputs.app_id }}" >> "$GITHUB_ENV"
      
      - name: Check if app is installed
        run: |
          APP_ID="${{ inputs.app_id }}"
          if adb -s "$ANDROID_SERIAL" shell pm list packages | grep -q "$APP_ID"; then
            echo "✅ App is installed"
          else
            echo "::warning::App $APP_ID not found on device."
            echo "⚠️ Add an APK install step or preinstall the app in STF before running Maestro."
            # adb install app.apk
          fi
      
      - name: Run Maestro tests
        id: maestro_tests
        run: |
          echo "▶️ Running Maestro on $ANDROID_SERIAL for $APP_ID"
          set +e
          maestro test "${{ inputs.test_path }}" --format junit --output maestro-report.xml
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
