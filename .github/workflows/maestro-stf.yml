name: Maestro Тесты на STF ферме

on:
  workflow_dispatch:
    inputs:
      device_serial:
        description: 'Серийный номер устройства (оставьте пустым для авто-выбора)'
        required: false
        type: string
      test_path:
        description: 'Путь к тесту или папке (например, .maestro/test.yaml)'
        required: false
        default: '.maestro/'
        type: string

jobs:
  maestro-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      # --- Установка Maestro с проверкой ---
      - name: Установить Maestro
        run: |
          echo "📦 Устанавливаем Maestro..."
          curl -Ls "https://get.maestro.mobile.dev" | bash
          
          # Добавляем в PATH
          export PATH="$HOME/.maestro/bin:$PATH"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          
          # Проверяем установку
          if command -v maestro &> /dev/null; then
            echo "✅ Maestro установлен: $(maestro --version)"
          else
            echo "❌ Ошибка: Maestro не установлен"
            exit 1
          fi

      # --- Установка ADB и STF клиента с проверкой ---
      - name: Установить ADB и STF клиент
        run: |
          echo "📦 Устанавливаем ADB и jq..."
          sudo apt-get update
          sudo apt-get install -y android-tools-adb jq
          
          echo "📦 Устанавливаем STF клиент..."
          pip install stf-client
          
          # Проверяем установку
          if command -v adb &> /dev/null; then
            echo "✅ ADB установлен: $(adb --version | head -1)"
          else
            echo "❌ Ошибка: ADB не установлен"
            exit 1
          fi
          
          if command -v stf &> /dev/null; then
            echo "✅ STF клиент установлен"
          else
            echo "❌ Ошибка: STF клиент не установлен"
            exit 1
          fi

      # --- Подключение к STF с подробной диагностикой ---
      - name: Подключиться к устройству STF
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
          DEVICE_SERIAL: ${{ inputs.device_serial || secrets.STF_DEVICE_SERIAL }}
        run: |
          # Проверяем, что секреты заданы
          if [ -z "$STF_URL" ]; then
            echo "❌ Ошибка: STF_URL не задан в секретах GitHub"
            exit 1
          fi
          
          if [ -z "$STF_TOKEN" ]; then
            echo "❌ Ошибка: STF_TOKEN не задан в секретах GitHub"
            exit 1
          fi
          
          echo "🔗 Подключаемся к STF серверу: $STF_URL"
          
          # Проверяем доступность STF сервера
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$STF_URL/api/v1/health" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ STF сервер доступен"
          else
            echo "❌ Не могу подключиться к STF серверу (HTTP $HTTP_CODE)"
            echo "Проверьте:"
            echo "  - URL: $STF_URL"
            echo "  - Доступность сети для GitHub Actions runner"
            echo "  - Firewall и настройки безопасности"
            exit 1
          fi
          
          # Авторизация
          echo "🔐 Авторизация..."
          if stf auth --url "$STF_URL" --token "$STF_TOKEN"; then
            echo "✅ Авторизация успешна"
          else
            echo "❌ Ошибка авторизации. Проверьте STF_TOKEN"
            exit 1
          fi
          
          # Список устройств
          echo "📱 Доступные устройства:"
          stf devices list --json | jq '.[] | {serial: .serial, model: .model, status: .status}'
          
          # Подключение к устройству
          if [ -n "$DEVICE_SERIAL" ]; then
            echo "📱 Подключаемся к устройству: $DEVICE_SERIAL"
            stf connect "$DEVICE_SERIAL" || {
              echo "❌ Не удалось подключиться к устройству $DEVICE_SERIAL"
              exit 1
            }
          else
            echo "🔍 Ищем свободное устройство..."
            DEVICE=$(stf devices list --json | jq -r '.[] | select(.status=="available") | .serial' | head -1)
            if [ -z "$DEVICE" ]; then
              echo "❌ Нет доступных устройств на ферме"
              echo "📊 Статус всех устройств:"
              stf devices list --json | jq '.[] | {serial: .serial, status: .status}'
              exit 1
            fi
            echo "📱 Используем устройство: $DEVICE"
            stf connect "$DEVICE" || {
              echo "❌ Не удалось подключиться к устройству $DEVICE"
              exit 1
            }
          fi
          
          # Ждем подключения ADB
          echo "⏳ Ожидаем ADB подключение..."
          sleep 5
          
          # Проверяем ADB
          echo "🔌 Проверка ADB:"
          adb devices
          
          # Ждем готовности устройства
          adb wait-for-device || echo "⚠️ Предупреждение: adb wait-for-device завершился с ошибкой"
          
          # Информация об устройстве
          echo "📊 Информация об устройстве:"
          adb shell getprop ro.product.model 2>/dev/null || echo "Не удалось получить модель"
          adb shell getprop ro.build.version.release 2>/dev/null || echo "Не удалось получить версию Android"

      # --- Проверка приложения ---
      - name: Проверить наличие приложения
        id: check_app
        continue-on-error: true
        run: |
          APP_ID="ru.neopharm.stolichki"
          echo "🔍 Проверяем приложение $APP_ID..."
          
          if adb shell pm list packages 2>/dev/null | grep -q "$APP_ID"; then
            echo "✅ Приложение установлено"
            echo "app_installed=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Приложение НЕ установлено на устройстве"
            echo "app_installed=false" >> $GITHUB_OUTPUT
          fi

      # --- Запуск тестов ---
      - name: Запустить Maestro тесты
        id: maestro_tests
        continue-on-error: true
        run: |
          TEST_PATH="${{ inputs.test_path || '.maestro/' }}"
          
          # Проверяем, существует ли папка с тестами
          if [ ! -d ".maestro" ] && [ ! -f "$TEST_PATH" ]; then
            echo "❌ Ошибка: Папка .maestro или файл $TEST_PATH не найдены"
            echo "📁 Содержимое репозитория:"
            ls -la
            exit 1
          fi
          
          echo "🚀 Запускаем тесты из: $TEST_PATH"
          
          # Запускаем Maestro с явным указанием PATH
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test "$TEST_PATH" \
            --format junit \
            --output maestro-report.xml || {
            echo "⚠️ Тесты завершились с ошибкой"
            exit 1
          }
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # --- Сохранение результатов ---
      - name: Сохранить результаты тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
          if-no-files-found: warn

      # --- Отключение от STF ---
      - name: Отключиться от STF
        if: always()
        continue-on-error: true
        run: |
          stf disconnect 2>/dev/null || true
          echo "✅ Устройство отключено"

      # --- Итоговый статус ---
      - name: Итоговый статус
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            echo "❌ Тесты завершились с ошибкой"
            exit 1
          else
            echo "✅ Все тесты прошли успешно"
          fi