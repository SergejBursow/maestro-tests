name: Maestro Тесты на STF ферме

on:
  workflow_dispatch:
    inputs:
      device_serial:
        description: 'Серийный номер устройства (оставьте пустым для авто-выбора)'
        required: false
        type: string
      test_path:
        description: 'Путь к тесту или папке'
        required: false
        default: '.maestro/'
        type: string

jobs:
  maestro-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Установить ADB
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb jq curl

      - name: Получить список устройств
        id: devices
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
        run: |
          echo "📱 Получаем список устройств..."
          DEVICES=$(curl -s -X GET "$STF_URL/api/v1/user/devices" \
            -H "Authorization: Bearer $STF_TOKEN")
          
          echo "$DEVICES" > devices.json
          
          echo "Доступные устройства:"
          echo "$DEVICES" | jq -r '.devices[] | "  Серийный: \(.serial) | Модель: \(.model) | Используется: \(.using)"'

      - name: Резервировать устройство
        id: reserve
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
          DEVICE_SERIAL: ${{ inputs.device_serial }}
        run: |
          # Если серийный номер не указан, берем первое свободное устройство
          if [ -z "$DEVICE_SERIAL" ]; then
            DEVICE_SERIAL=$(cat devices.json | jq -r '.devices[] | select(.using == false) | .serial' | head -1)
          fi
          
          if [ -z "$DEVICE_SERIAL" ] || [ "$DEVICE_SERIAL" = "null" ]; then
            echo "❌ Нет доступных устройств"
            echo "Все устройства заняты. Освободите устройство в веб-интерфейсе."
            exit 1
          fi
          
          echo "🔒 Резервируем устройство: $DEVICE_SERIAL"
          
          # Резервируем устройство
          RESERVE=$(curl -s -X POST "$STF_URL/api/v1/user/devices/$DEVICE_SERIAL/remoteConnect" \
            -H "Authorization: Bearer $STF_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "Ответ: $RESERVE"
          
          REMOTE_URL=$(echo "$RESERVE" | jq -r '.remoteConnectUrl')
          
          if [ -z "$REMOTE_URL" ] || [ "$REMOTE_URL" = "null" ]; then
            echo "❌ Не удалось зарезервировать устройство"
            exit 1
          fi
          
          echo "✅ Устройство зарезервировано"
          echo "🔌 ADB адрес: $REMOTE_URL"
          echo "remote_url=$REMOTE_URL" >> $GITHUB_OUTPUT
          echo "device_serial=$DEVICE_SERIAL" >> $GITHUB_OUTPUT

      - name: Подключиться к устройству
        run: |
          REMOTE_URL="${{ steps.reserve.outputs.remote_url }}"
          echo "🔌 Подключаемся к $REMOTE_URL"
          
          adb connect "$REMOTE_URL"
          
          # Ждем подключения
          for i in {1..10}; do
            sleep 2
            if adb devices | grep -q "$REMOTE_URL.*device"; then
              echo "✅ Устройство подключено"
              break
            fi
            echo "⏳ Ожидание подключения... ($i/10)"
          done
          
          adb devices
          
          # Информация об устройстве
          echo "📊 Устройство готово:"
          adb shell getprop ro.product.model 2>/dev/null
          adb shell getprop ro.build.version.release 2>/dev/null

      - name: Запустить Maestro тесты
        id: maestro_tests
        continue-on-error: true
        run: |
          TEST_PATH="${{ inputs.test_path || '.maestro/' }}"
          export PATH="$HOME/.maestro/bin:$PATH"
          
          echo "🚀 Запускаем тесты..."
          maestro test "$TEST_PATH" \
            --format junit \
            --output maestro-report.xml
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Сохранить результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
          if-no-files-found: warn

      - name: Освободить устройство
        if: always()
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
        run: |
          DEVICE_SERIAL="${{ steps.reserve.outputs.device_serial }}"
          echo "🔓 Освобождаем устройство $DEVICE_SERIAL"
          
          curl -s -X POST "$STF_URL/api/v1/user/devices/$DEVICE_SERIAL/remoteDisconnect" \
            -H "Authorization: Bearer $STF_TOKEN" || true
          
          adb disconnect
          echo "✅ Устройство освобождено"

      - name: Итоговый статус
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi