name: Maestro Тесты на STF ферме

on:
  workflow_dispatch:
    inputs:
      device_serial:
        description: 'Серийный номер устройства (оставьте пустым для авто-выбора)'
        required: false
        type: string
      test_path:
        description: 'Путь к тесту или папке (например, .maestro/test.yaml)'
        required: false
        default: '.maestro/'
        type: string

jobs:
  maestro-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Maestro
        run: |
          echo "📦 Устанавливаем Maestro..."
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          echo "✅ Maestro установлен"

      - name: Установить ADB и инструменты
        run: |
          echo "📦 Устанавливаем ADB, curl и jq..."
          sudo apt-get update
          sudo apt-get install -y android-tools-adb jq curl
          echo "✅ ADB установлен"

      - name: Подключиться к устройству STF
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
          DEVICE_SERIAL: ${{ inputs.device_serial || secrets.STF_DEVICE_SERIAL }}
        run: |
          # Проверяем секреты
          if [ -z "$STF_URL" ]; then
            echo "❌ Ошибка: STF_URL не задан в секретах GitHub"
            exit 1
          fi
          
          if [ -z "$STF_TOKEN" ]; then
            echo "❌ Ошибка: STF_TOKEN не задан в секретах GitHub"
            exit 1
          fi
          
          echo "🔗 STF сервер: $STF_URL"
          
          # Получаем список устройств через правильный эндпоинт
          echo "📱 Получаем список устройств..."
          DEVICES_RESPONSE=$(curl -s -X GET "$STF_URL/api/v1/user/devices" \
            -H "Authorization: Bearer $STF_TOKEN")
          
          echo "📊 Ответ от STF:"
          echo "$DEVICES_RESPONSE" | jq '.' 2>/dev/null || echo "$DEVICES_RESPONSE"
          
          # Проверяем, есть ли устройства
          DEVICE_COUNT=$(echo "$DEVICES_RESPONSE" | jq '.devices | length' 2>/dev/null || echo "0")
          if [ "$DEVICE_COUNT" = "0" ]; then
            echo "❌ Нет устройств на ферме"
            exit 1
          fi
          
          # Показываем доступные устройства
          echo "📊 Доступные устройства:"
          echo "$DEVICES_RESPONSE" | jq -r '.devices[] | "  Серийный: \(.serial) | Статус: \(.present) | Используется: \(.using)"' 2>/dev/null
          
          # Выбираем устройство
          if [ -n "$DEVICE_SERIAL" ]; then
            echo "📱 Используем указанное устройство: $DEVICE_SERIAL"
            TARGET_SERIAL="$DEVICE_SERIAL"
          else
            echo "🔍 Ищем свободное устройство..."
            TARGET_SERIAL=$(echo "$DEVICES_RESPONSE" | jq -r '.devices[] | select(.present == true and .using == false) | .serial' | head -1)
            if [ -z "$TARGET_SERIAL" ]; then
              echo "❌ Нет доступных устройств на ферме"
              exit 1
            fi
            echo "📱 Найдено свободное устройство: $TARGET_SERIAL"
          fi
          
          # Резервируем устройство
          echo "🔒 Резервируем устройство $TARGET_SERIAL..."
          RESERVE_RESPONSE=$(curl -s -X POST "$STF_URL/api/v1/user/devices/$TARGET_SERIAL/remoteConnect" \
            -H "Authorization: Bearer $STF_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "Ответ на резервирование:"
          echo "$RESERVE_RESPONSE" | jq '.' 2>/dev/null || echo "$RESERVE_RESPONSE"
          
          # Получаем адрес для ADB подключения
          REMOTE_URL=$(echo "$RESERVE_RESPONSE" | jq -r '.remoteConnectUrl // empty')
          
          if [ -z "$REMOTE_URL" ]; then
            echo "❌ Не удалось зарезервировать устройство"
            exit 1
          fi
          
          echo "✅ Устройство зарезервировано"
          echo "🔌 ADB адрес: $REMOTE_URL"
          
          # Подключаемся через ADB
          adb connect "$REMOTE_URL"
          
          # Ждем подключения
          sleep 3
          
          # Проверяем ADB подключение
          echo "🔌 Проверка ADB:"
          adb devices
          
          # Сохраняем серийный номер
          echo "TARGET_SERIAL=$TARGET_SERIAL" >> $GITHUB_ENV
          
          # Получаем информацию об устройстве
          echo "📊 Информация об устройстве:"
          adb shell getprop ro.product.model 2>/dev/null || echo "  Модель: неизвестно"
          adb shell getprop ro.build.version.release 2>/dev/null || echo "  Android: неизвестно"

      - name: Проверить наличие приложения
        id: check_app
        continue-on-error: true
        run: |
          APP_ID="ru.neopharm.stolichki"
          echo "🔍 Проверяем приложение $APP_ID..."
          
          if adb shell pm list packages 2>/dev/null | grep -q "$APP_ID"; then
            echo "✅ Приложение установлено"
            echo "app_installed=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Приложение НЕ установлено на устройстве"
            echo "app_installed=false" >> $GITHUB_OUTPUT
            echo "📱 Список установленных приложений (первые 10):"
            adb shell pm list packages | head -10
          fi

      - name: Запустить Maestro тесты
        id: maestro_tests
        continue-on-error: true
        run: |
          TEST_PATH="${{ inputs.test_path || '.maestro/' }}"
          
          if [ ! -d ".maestro" ] && [ ! -f "$TEST_PATH" ]; then
            echo "❌ Ошибка: Папка .maestro или файл $TEST_PATH не найдены"
            ls -la
            exit 1
          fi
          
          echo "🚀 Запускаем тесты из: $TEST_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          
          maestro test "$TEST_PATH" \
            --format junit \
            --output maestro-report.xml
          
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Тесты прошли успешно"
          else
            echo "⚠️ Тесты завершились с ошибкой (код: $EXIT_CODE)"
          fi

      - name: Сохранить результаты тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
          if-no-files-found: warn

      - name: Отключиться от STF
        if: always()
        continue-on-error: true
        run: |
          if [ -n "$TARGET_SERIAL" ]; then
            echo "🔓 Освобождаем устройство $TARGET_SERIAL..."
            curl -s -X POST "$STF_URL/api/v1/user/devices/$TARGET_SERIAL/remoteDisconnect" \
              -H "Authorization: Bearer $STF_TOKEN" \
              -H "Content-Type: application/json" || true
            
            adb disconnect 2>/dev/null || true
            echo "✅ Устройство освобождено"
          fi

      - name: Итоговый статус
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            echo "❌ Тесты завершились с ошибкой"
            exit 1
          else
            echo "✅ Все тесты прошли успешно"
          fi