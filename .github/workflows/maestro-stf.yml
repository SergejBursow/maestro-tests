name: Maestro Тесты на STF ферме

on:
  workflow_dispatch:
    inputs:
      device_serial:
        description: 'Серийный номер устройства (оставьте пустым для авто-выбора)'
        required: false
        type: string
      test_path:
        description: 'Путь к тесту или папке (например, .maestro/test.yaml)'
        required: false
        default: '.maestro/'
        type: string

jobs:
  maestro-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      # --- Установка Maestro ---
      - name: Установить Maestro
        run: |
          echo "📦 Устанавливаем Maestro..."
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$HOME/.maestro/bin:$PATH"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          
          if command -v maestro &> /dev/null; then
            echo "✅ Maestro установлен: $(maestro --version)"
          else
            echo "❌ Ошибка: Maestro не установлен"
            exit 1
          fi

      # --- Установка ADB и инструментов для работы с STF через API ---
      - name: Установить ADB и curl
        run: |
          echo "📦 Устанавливаем ADB и curl..."
          sudo apt-get update
          sudo apt-get install -y android-tools-adb jq curl
          
          if command -v adb &> /dev/null; then
            echo "✅ ADB установлен: $(adb --version | head -1)"
          else
            echo "❌ Ошибка: ADB не установлен"
            exit 1
          fi
          
          echo "✅ curl и jq установлены"

      # --- Подключение к STF с использованием прямых API запросов ---
      - name: Подключиться к устройству STF
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
          DEVICE_SERIAL: ${{ inputs.device_serial || secrets.STF_DEVICE_SERIAL }}
        run: |
          # Проверяем, что секреты заданы
          if [ -z "$STF_URL" ]; then
            echo "❌ Ошибка: STF_URL не задан в секретах GitHub"
            exit 1
          fi
          
          if [ -z "$STF_TOKEN" ]; then
            echo "❌ Ошибка: STF_TOKEN не задан в секретах GitHub"
            exit 1
          fi
          
          echo "🔗 Подключаемся к STF серверу: $STF_URL"
          
          # Проверяем доступность STF сервера через API
          echo "🔍 Проверяем доступность API..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$STF_URL/api/v1/health" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ STF сервер доступен"
          else
            echo "❌ Не могу подключиться к STF серверу (HTTP $HTTP_CODE)"
            echo "Проверьте:"
            echo "  - URL: $STF_URL"
            echo "  - Доступность сети для GitHub Actions runner"
            exit 1
          fi
          
          # Получаем список устройств через API
          echo "📱 Получаем список устройств..."
          DEVICES_RESPONSE=$(curl -s -X GET "$STF_URL/api/v1/devices" \
            -H "Authorization: Bearer $STF_TOKEN")
          
          echo "📊 Доступные устройства:"
          echo "$DEVICES_RESPONSE" | jq -r '.devices[] | "  Серийный: \(.serial) | Статус: \(.present ? "подключено" : "отключено") | Используется: \(.using ? "да" : "нет")"'
          
          # Определяем устройство для подключения
          if [ -n "$DEVICE_SERIAL" ]; then
            echo "📱 Используем указанное устройство: $DEVICE_SERIAL"
            TARGET_SERIAL="$DEVICE_SERIAL"
          else
            echo "🔍 Ищем свободное устройство..."
            TARGET_SERIAL=$(echo "$DEVICES_RESPONSE" | jq -r '.devices[] | select(.present == true and .using == false) | .serial' | head -1)
            if [ -z "$TARGET_SERIAL" ]; then
              echo "❌ Нет доступных устройств на ферме"
              exit 1
            fi
            echo "📱 Найдено свободное устройство: $TARGET_SERIAL"
          fi
          
          # Резервируем устройство через API
          echo "🔒 Резервируем устройство..."
          RESERVE_RESPONSE=$(curl -s -X POST "$STF_URL/api/v1/user/devices/$TARGET_SERIAL/remoteConnect" \
            -H "Authorization: Bearer $STF_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "Ответ API: $RESERVE_RESPONSE"
          
          # Извлекаем remoteConnectUrl из ответа
          REMOTE_URL=$(echo "$RESERVE_RESPONSE" | jq -r '.remoteConnectUrl // empty')
          
          if [ -z "$REMOTE_URL" ]; then
            echo "❌ Не удалось зарезервировать устройство"
            echo "Ответ API: $RESERVE_RESPONSE"
            exit 1
          fi
          
          echo "✅ Устройство зарезервировано"
          echo "🔌 Подключаемся через ADB: $REMOTE_URL"
          
          # Подключаемся через ADB (формат: adb connect ip:port)
          adb connect "$REMOTE_URL"
          
          # Ждем подключения
          sleep 3
          
          # Проверяем ADB подключение
          echo "🔌 Проверка ADB:"
          adb devices
          
          # Ждем готовности устройства
          adb wait-for-device || echo "⚠️ Предупреждение: adb wait-for-device завершился с ошибкой"
          
          # Сохраняем серийный номер для следующих шагов
          echo "TARGET_SERIAL=$TARGET_SERIAL" >> $GITHUB_ENV
          
          # Информация об устройстве
          echo "📊 Информация об устройстве:"
          MODEL=$(adb shell getprop ro.product.model 2>/dev/null || echo "Неизвестно")
          ANDROID_VERSION=$(adb shell getprop ro.build.version.release 2>/dev/null || echo "Неизвестно")
          echo "  Модель: $MODEL"
          echo "  Android: $ANDROID_VERSION"

      # --- Проверка приложения ---
      - name: Проверить наличие приложения
        id: check_app
        continue-on-error: true
        run: |
          APP_ID="ru.neopharm.stolichki"
          echo "🔍 Проверяем приложение $APP_ID..."
          
          if adb shell pm list packages 2>/dev/null | grep -q "$APP_ID"; then
            echo "✅ Приложение установлено"
            echo "app_installed=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Приложение НЕ установлено на устройстве"
            echo "app_installed=false" >> $GITHUB_OUTPUT
            echo "📱 Список установленных приложений (первые 10):"
            adb shell pm list packages | head -10
          fi

      # --- Запуск тестов ---
      - name: Запустить Maestro тесты
        id: maestro_tests
        continue-on-error: true
        run: |
          TEST_PATH="${{ inputs.test_path || '.maestro/' }}"
          
          # Проверяем, существует ли папка с тестами
          if [ ! -d ".maestro" ] && [ ! -f "$TEST_PATH" ]; then
            echo "❌ Ошибка: Папка .maestro или файл $TEST_PATH не найдены"
            echo "📁 Содержимое репозитория:"
            ls -la
            exit 1
          fi
          
          echo "🚀 Запускаем тесты из: $TEST_PATH"
          echo "📱 Устройство: $TARGET_SERIAL"
          
          # Запускаем Maestro с явным указанием PATH
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test "$TEST_PATH" \
            --format junit \
            --output maestro-report.xml
          
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Тесты прошли успешно"
          else
            echo "⚠️ Тесты завершились с ошибкой (код: $EXIT_CODE)"
          fi

      # --- Сохранение результатов ---
      - name: Сохранить результаты тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report.xml
            ~/.maestro/tests/**/*
          retention-days: 7
          if-no-files-found: warn

      # --- Отключение от STF (освобождение устройства) ---
      - name: Отключиться от STF
        if: always()
        continue-on-error: true
        env:
          STF_URL: ${{ secrets.STF_URL }}
          STF_TOKEN: ${{ secrets.STF_TOKEN }}
        run: |
          if [ -n "$TARGET_SERIAL" ]; then
            echo "🔓 Освобождаем устройство $TARGET_SERIAL..."
            curl -s -X POST "$STF_URL/api/v1/user/devices/$TARGET_SERIAL/remoteDisconnect" \
              -H "Authorization: Bearer $STF_TOKEN" \
              -H "Content-Type: application/json" || true
            echo "✅ Устройство освобождено"
          fi

      # --- Итоговый статус ---
      - name: Итоговый статус
        if: always()
        run: |
          if [ "${{ steps.maestro_tests.outputs.exit_code }}" != "0" ]; then
            echo "❌ Тесты завершились с ошибкой"
            exit 1
          else
            echo "✅ Все тесты прошли успешно"
          fi