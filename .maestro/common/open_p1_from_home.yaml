# Общий подфлоу: открыть карточку первого товара с главного экрана.
appId: com.example.testmaestro
env:
  PRODUCT_CARD_ID: ${PRODUCT_CARD_ID || "product_card_p1"}
  PRODUCT_DETAIL_SCREEN_ID: ${PRODUCT_DETAIL_SCREEN_ID || "product_detail_screen"}
  PRODUCT_DETAIL_TITLE_ID: ${PRODUCT_DETAIL_TITLE_ID || "product_detail_title"}
---
- assertVisible:
    id: ${PRODUCT_CARD_ID}
- tapOn:
    id: ${PRODUCT_CARD_ID}
# Убеждаемся, что открылась карточка товара.
- assertVisible:
    id: ${PRODUCT_DETAIL_SCREEN_ID}
- assertVisible:
    id: ${PRODUCT_DETAIL_TITLE_ID}
