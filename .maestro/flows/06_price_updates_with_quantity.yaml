# Проверка, что итоговая цена в корзине корректно меняется при изменении количества.
appId: com.example.testmaestro
name: Обновление цены при изменении количества
env:
  ADD_TO_CART_BUTTON_ID: ${ADD_TO_CART_BUTTON_ID || "home_add_to_cart_p1"}
  EXPECTED_QUANTITY_AFTER_INCREMENT: ${EXPECTED_QUANTITY_AFTER_INCREMENT || "2"}
  PRICE_TOLERANCE: ${PRICE_TOLERANCE || 0.01}
---
- launchApp:
    appId: com.example.testmaestro
    clearState: true
- assertVisible:
    id: home_screen
- assertVisible:
    id: ${ADD_TO_CART_BUTTON_ID}
- tapOn:
    id: ${ADD_TO_CART_BUTTON_ID}
# Открываем корзину и сверяем цену до и после увеличения количества товара.
- tapOn:
    id: tab_cart
- assertVisible:
    id: cart_screen
# Считываем текущую сумму корзины в maestro.copiedText.
- copyTextFrom:
    id: cart_total_price
# Сохраняем исходный текст цены и переводим его в число через JS.
- evalScript: ${output.initialPriceText = maestro.copiedText}
- evalScript: ${output.initialPrice = parseFloat(output.initialPriceText.replace(/[^\d,.-]/g, '').replace(',', '.'))}
- tapOn:
    id: increase_p1
# Считываем новое количество товара после нажатия на увеличение.
- copyTextFrom:
    id: quantity_value_p1
# JS-проверка подтверждает, что количество стало равно 2.
- assertTrue:
    condition: ${maestro.copiedText == EXPECTED_QUANTITY_AFTER_INCREMENT}
    label: Количество товара должно стать равно 2
# Повторно считываем итоговую сумму корзины после изменения количества.
- copyTextFrom:
    id: cart_total_price
# Сохраняем новый текст цены и переводим его в число.
- evalScript: ${output.updatedPriceText = maestro.copiedText}
- evalScript: ${output.updatedPrice = parseFloat(output.updatedPriceText.replace(/[^\d,.-]/g, '').replace(',', '.'))}
# JS-проверка подтверждает, что итоговая сумма увеличилась пропорционально количеству.
- assertTrue:
    condition: ${Math.abs(output.updatedPrice - output.initialPrice * parseFloat(EXPECTED_QUANTITY_AFTER_INCREMENT)) < PRICE_TOLERANCE}
    label: Итоговая сумма должна увеличиться пропорционально количеству
